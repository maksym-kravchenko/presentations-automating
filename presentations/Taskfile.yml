version: '3'

tasks:

  new:
    desc: "Usage: task new -- my-talk  OR  task new -- subfolder/my-talk"
    cmds:
      - cmd: node scripts/new.cjs {{.CLI_ARGS | trim}}
      - cmd: node scripts/inject.cjs {{.CLI_ARGS | trim}}

  inject:
    desc: "Usage: task inject -- subfolder/my-talk"
    cmds:
      - cmd: node scripts/inject.cjs {{.CLI_ARGS | trim}}

  watch:
    desc: "Usage: task watch -- subfolder/my-talk"
    cmds:
      - cmd: node scripts/inject.cjs {{.CLI_ARGS | trim}}
      - cmd: pnpm slidev slides/{{.CLI_ARGS | trim}}.md

  build:
    desc: "Usage: task build -- subfolder/my-talk"
    cmds:
      - cmd: node scripts/inject.cjs {{.CLI_ARGS | trim}}
      - cmd: pnpm slidev build slides/{{.CLI_ARGS | trim}}.md --out output/{{.CLI_ARGS | trim}}

  pdf:
    desc: "Usage: task pdf -- subfolder/my-talk"
    cmds:
      - cmd: node scripts/inject.cjs {{.CLI_ARGS | trim}}
      - cmd: pnpm slidev export slides/{{.CLI_ARGS | trim}}.md --output output/{{.CLI_ARGS | trim}}.pdf

  build-all:
    desc: "Build all presentations"
    cmds:
      - cmd: node scripts/build-all.cjs