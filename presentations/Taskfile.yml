version: '3'

tasks:
  new:
    desc: "Usage: task new n=my-talk [t=config.js] [e=true]"
    cmds:
      - cmd: node scripts/new.cjs "{{.n}}" "{{default "true" .e}}" 
      - cmd: node scripts/inject.cjs "{{.n}}"
      - cmd: node scripts/inject_theme.cjs "{{.n}}" "{{.t}}"

  inject:
    desc: "Usage: task inject n=my-talk [t=config.js]"
    cmds:
      - cmd: node scripts/inject.cjs "{{.n}}"
      - cmd: node scripts/inject_theme.cjs "{{.n}}" "{{.t}}"

  watch:
    desc: "Usage: task watch n=my-talk [t=config.js]"
    cmds:
      - cmd: node scripts/inject.cjs "{{.n}}"
      - cmd: node scripts/inject_theme.cjs "{{.n}}" "{{.t}}"
      - cmd: pnpm slidev slides/{{.n}}.md

  pdf:
    desc: "Usage: task pdf n=my-talk [o=true] [t=config.js]"
    cmds:
      - cmd: node scripts/inject.cjs "{{.n}}"
      - cmd: node scripts/inject_theme.cjs "{{.n}}" "{{.t}}"
      - cmd: pnpm slidev export slides/{{.n}}.md --format pdf --output output/{{.n}}.pdf
      - cmd: powershell -NoProfile -Command "if ('{{.o}}' -eq 'true') { Start-Process (Resolve-Path 'output/{{.n}}.pdf') }"

  pptx:
    desc: "Usage: task pptx n=my-talk [o=true] [t=config.js]"
    cmds:
      - cmd: node scripts/inject.cjs "{{.n}}"
      - cmd: node scripts/inject_theme.cjs "{{.n}}" "{{.t}}"
      - cmd: pnpm slidev export slides/{{.n}}.md --format pptx --output output/{{.n}}.pptx
      - cmd: powershell -NoProfile -Command "if ('{{.o}}' -eq 'true') { Start-Process (Resolve-Path 'output/{{.n}}.pptx') }"

  list:
    desc: "List all presentations with their details"
    cmds:
      - cmd: node scripts/list.cjs

  rename:
    desc: "Usage: task rename FROM=old-name TO=new-name"
    cmds:
      - cmd: node scripts/rename.cjs "{{.FROM}}" "{{.TO}}"

  duplicate:
    desc: "Usage: task duplicate FROM=source TO=new-name"
    cmds:
      - cmd: node scripts/duplicate.cjs "{{.FROM}}" "{{.TO}}"
      - cmd: node scripts/inject.cjs "{{.TO}}"

  setup:
    desc: "Run once after cloning"
    cmds:
      - cmd: pnpm install
      - cmd: pnpm approve-builds
      - cmd: pnpm exec playwright install chromium
      - cmd: pip install python-pptx pyyaml --break-system-packages