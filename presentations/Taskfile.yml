version: '3'

tasks:

  new:
    desc: "Create a new slide. Usage: task new -- my-talk  OR  task new -- subfolder/my-talk"
    cmds:
      - cmd: node scripts/new.cjs {{.CLI_ARGS | trim}}
      - cmd: node scripts/inject.cjs {{.CLI_ARGS | trim}}

  inject:
    desc: "Inject config.json into frontmatter. Usage: task inject -- subfolder/my-talk"
    cmds:
      - cmd: node scripts/inject.cjs {{.CLI_ARGS | trim}}

  watch:
    desc: "Usage: task watch -- subfolder/my-talk"
    cmds:
      - cmd: node scripts/inject.cjs {{.CLI_ARGS | trim}}
      - cmd: pnpm slidev slides/{{.CLI_ARGS | trim}}.md

  build:
    desc: "Usage: task build -- subfolder/my-talk"
    cmds:
      - cmd: node scripts/inject.cjs {{.CLI_ARGS | trim}}
      - cmd: pnpm slidev build slides/{{.CLI_ARGS | trim}}.md --out output/{{.CLI_ARGS | trim}}

  pdf:
    desc: "Usage: task pdf -- subfolder/my-talk"
    cmds:
      - cmd: node scripts/inject.cjs {{.CLI_ARGS | trim}}
      - cmd: pnpm slidev export slides/{{.CLI_ARGS | trim}}.md --output output/{{.CLI_ARGS | trim}}.pdf

  pptx:
    desc: "Usage: task pptx -- subfolder/my-talk"
    cmds:
      - cmd: node scripts/inject.cjs {{.CLI_ARGS | trim}}
      - cmd: pnpm slidev export slides/{{.CLI_ARGS | trim}}.md --format pptx --output output/{{.CLI_ARGS | trim}}.pptx

  pptx-edit:
    desc: "Export to editable PPTX. Usage: task pptx-edit -- subfolder/my-talk"
    cmds:
      - cmd: node scripts/inject.cjs {{.CLI_ARGS | trim}}
      - cmd: pandoc slides/{{.CLI_ARGS | trim}}.md --reference-doc=template.pptx -o output/{{.CLI_ARGS | trim}}.pptx

  build-all:
    desc: "Build all presentations"
    cmds:
      - cmd: node scripts/build-all.cjs